/* ── header ── */

<script>
// ═══════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════
const SUBJECTS = {
  國語: { bg:"#CFEEF5", text:"#2a7a9a", bar:"#A8CAD3" },
  數學: { bg:"#FFFADE", text:"#9a8010", bar:"#FFD67A" },
  英文: { bg:"#FFDDDF", text:"#b04060", bar:"#FC8EA7" },
  社會: { bg:"#D0EEE7", text:"#2a6a80", bar:"#A8CAD3" },
  自然: { bg:"#DFF0E2", text:"#2a7040", bar:"#B4E1D8" },
  課程: { bg:"#F0EFEF", text:"#787878", bar:"#C8C8C8" },
};
const KEYS      = Object.keys(SUBJECTS);
const DAYS_EN   = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const MONTHS_EN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

const PRESET = {
  "2026-03-29":[{id:1, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-04-01":[{id:14,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-04-08":[{id:15,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-04-12":[{id:2, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-04-15":[{id:16,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-04-22":[{id:17,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-04-26":[{id:3, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-04-29":[{id:18,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-05-06":[{id:19,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-05-10":[{id:4, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-05-13":[{id:20,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-05-20":[{id:21,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-05-24":[{id:5, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-05-27":[{id:22,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-06-03":[{id:23,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-06-07":[{id:6, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-06-10":[{id:24,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-06-17":[{id:25,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
  "2026-06-21":[{id:7, subject:"課程",text:"梧桐樹 16:30～18:30",done:false,span:0}],
  "2026-06-24":[{id:26,subject:"課程",text:"梧桐樹 18:10～20:10",done:false,span:0}],
};

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let tasks     = JSON.parse(JSON.stringify(PRESET));
let view      = "month";
let curYear   = new Date().getFullYear();
let curMonth  = new Date().getMonth();
let weekMon   = getMondayOf(new Date());
let addCtx    = null;  // {key, y, m, d}
let detailCtx = null;  // {key, idx}
let isEditing = false;
let db        = null;
let dbReady   = false;

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function getMondayOf(d) {
  const r = new Date(d);
  r.setDate(r.getDate() + (r.getDay()===0 ? -6 : 1-r.getDay()));
  return r;
}
function dKey(y,m,d) { return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function todayKey() { const t=new Date(); return dKey(t.getFullYear(),t.getMonth()+1,t.getDate()); }
function addDays(k,n) { const d=new Date(k+"T00:00:00"); d.setDate(d.getDate()+n); return dKey(d.getFullYear(),d.getMonth()+1,d.getDate()); }
function daysBetween(a,b) { return Math.round((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000); }
function stripTime(t) { return t.replace(/\s*\d{1,2}:\d{2}[～~\-]\d{1,2}:\d{2}/,"").trim()||t; }
function fmtDate(k) { const d=new Date(k+"T00:00:00"); return `${MONTHS_EN[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`; }

function setSyncUI(state, msg) {
  const dot = document.getElementById("syncDot");
  dot.className = "sync-dot " + state;
  document.getElementById("syncMsg").textContent = msg;
}

// ═══════════════════════════════════
// FIREBASE
// ═══════════════════════════════════
function initFirebase() {
  // Check if config is filled in
  if (FIREBASE_CONFIG.apiKey === "請填入 apiKey") {
    setSyncUI("error", "⚠️ 請先填入 Firebase 設定（見 HTML 頂部說明）");
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();

    setSyncUI("saving", "Connecting…");

    // Listen for realtime updates
    db.ref("tasks").on("value", snapshot => {
      const remote = snapshot.val();
      if (remote) {
        // Merge remote over preset
        const merged = JSON.parse(JSON.stringify(PRESET));
        Object.entries(remote).forEach(([k,v]) => {
          const arr = Object.values(v); // Firebase stores arrays as objects
          if (merged[k]) {
            const extra = arr.filter(t => !merged[k].some(p => p.text===t.text && p.subject===t.subject));
            merged[k] = merged[k].map(p => {
              const match = arr.find(s => s.text===p.text && s.subject===p.subject);
              return match || p;
            }).concat(extra);
          } else {
            merged[k] = arr;
          }
        });
        tasks = merged;
        render();
      }
      if (!dbReady) {
        dbReady = true;
        setSyncUI("live", "Live sync ✓");
      } else {
        setSyncUI("live", "Live sync ✓");
      }
    }, err => {
      setSyncUI("error", "Sync error — check Firebase rules");
      console.error(err);
    });

  } catch(e) {
    setSyncUI("error", "Firebase error: " + e.message);
    console.error(e);
  }
}

function saveToFirebase() {
  if (!db) return;
  setSyncUI("saving", "Saving…");
  // Only save non-preset tasks, or all tasks with done state
  const toSave = {};
  Object.entries(tasks).forEach(([k, v]) => {
    toSave[k] = v; // save as array-like object
  });
  db.ref("tasks").set(toSave)
    .then(() => setSyncUI("live", "Live sync ✓"))
    .catch(e => { setSyncUI("error", "Save failed"); console.error(e); });
}

// ═══════════════════════════════════
// BUILD LEGEND
// ═══════════════════════════════════
function buildLegend() {
  const el = document.getElementById("legend");
  KEYS.forEach(k => {
    const s = SUBJECTS[k];
    const d = document.createElement("div");
    d.className = "legend-item";
    d.style.cssText = `color:${s.text};background:${s.bg};border-color:${s.bar}`;
    d.innerHTML = `<div class="legend-bar" style="background:${s.bar}"></div>${k}`;
    el.appendChild(d);
  });
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render() {
  updatePeriodLabel();
  if (view === "month") renderMonth();
  else renderWeek();
}

function updatePeriodLabel() {
  let label;
  if (view === "month") {
    label = `${MONTHS_EN[curMonth]} ${curYear}`;
  } else {
    const sun = new Date(weekMon); sun.setDate(sun.getDate()+6);
    label = `${MONTHS_EN[weekMon.getMonth()]} ${weekMon.getDate()} – ${MONTHS_EN[sun.getMonth()]} ${sun.getDate()}`;
  }
  document.getElementById("periodLabel").textContent = label;
}

// ── Month ──
function renderMonth() {
  const area = document.getElementById("calendarArea");
  area.innerHTML = "";
  const wrap = document.createElement("div"); wrap.className = "cal-wrap";

  // headers
  const hdrs = document.createElement("div"); hdrs.className = "day-headers";
  DAYS_EN.forEach((n,i) => {
    const h = document.createElement("div"); h.className = "day-hdr";
    h.style.color = i===5?"#FC8EA7":i===6?"#ACACD5":"";
    h.textContent = n; hdrs.appendChild(h);
  });
  wrap.appendChild(hdrs);

  const grid = document.createElement("div"); grid.className = "month-grid";
  const fd  = (new Date(curYear,curMonth,1).getDay()+6)%7;
  const dim = new Date(curYear,curMonth+1,0).getDate();
  const dip = new Date(curYear,curMonth,0).getDate();
  const total = Math.ceil((fd+dim)/7)*7;
  const tk = todayKey();

  for (let i=0;i<total;i++) {
    let day, y=curYear, m=curMonth, other=false;
    if (i<fd)           { day=dip-fd+1+i; m=curMonth-1; if(m<0){m=11;y--;} other=true; }
    else if(i>=fd+dim)  { day=i-fd-dim+1; m=curMonth+1; if(m>11){m=0;y++;} other=true; }
    else                  day=i-fd+1;
    const col = i%7, sat=col===5, sun=col===6;
    const key = dKey(y,m+1,day);
    const isToday = key===tk;

    const cell = document.createElement("div");
    cell.className = "day-cell" + (isToday?" today":"");

    // date number
    const numEl = document.createElement("div"); numEl.className = "day-num";
    if (isToday) {
      numEl.style.background = sat?"#FFDDDF":sun?"#E8E7F5":"#EAC8A0";
      numEl.style.color = sat?"#b04060":sun?"#6b6b9a":"#8a6a40";
    } else {
      numEl.style.color = other?"#ccc":sat?"#FC8EA7":sun?"#ACACD5":"";
    }
    numEl.textContent = day;
    cell.appendChild(numEl);

    // tasks
    renderDayContent(cell, key, false, true, other, y, m+1, day);
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  area.appendChild(wrap);
}

// ── Week ──
function renderWeek() {
  const area = document.getElementById("calendarArea");
  area.innerHTML = "";
  const list = document.createElement("div"); list.className = "week-list";
  const tk = todayKey();

  for (let i=0;i<7;i++) {
    const d = new Date(weekMon); d.setDate(d.getDate()+i);
    const y=d.getFullYear(), m=d.getMonth(), day=d.getDate();
    const key=dKey(y,m+1,day), sat=i===5, sun=i===6, isToday=key===tk;
    const taskCount=(tasks[key]||[]).length;
    const barColor = sat?"#FC8EA7":sun?"#ACACD5":"#ddd8d0";
    const circBg   = sat?"#FFDDDF":sun?"#E8E7F5":"#ede8e2";

    const card = document.createElement("div");
    card.className = "week-card"+(isToday?" today":"");

    // left bar
    const bar = document.createElement("div"); bar.className="week-left-bar";
    bar.style.background = barColor; card.appendChild(bar);

    const body = document.createElement("div"); body.className="week-body";

    // header
    const hdr = document.createElement("div"); hdr.className="week-hdr";

    const circ = document.createElement("div"); circ.className="week-circle";
    circ.style.background = circBg;
    const wday = document.createElement("div"); wday.className="wday";
    wday.style.color = sat?"#FC8EA7":sun?"#ACACD5":"var(--mid)";
    wday.textContent = DAYS_EN[i];
    const wnum = document.createElement("div"); wnum.className="wnum";
    wnum.style.color = sat?"#c0607a":sun?"#7070b0":"var(--dark)";
    wnum.textContent = day;
    circ.appendChild(wday); circ.appendChild(wnum); hdr.appendChild(circ);

    const info = document.createElement("div"); info.className="week-hdr-info";
    const title = document.createElement("div"); title.className="week-hdr-title";
    title.textContent = DAYS_EN[i]+(isToday?" · Today":"");
    const dateStr = document.createElement("div"); dateStr.className="week-hdr-date";
    dateStr.textContent = `${MONTHS_EN[m]} ${day}, ${y}`;
    info.appendChild(title); info.appendChild(dateStr); hdr.appendChild(info);

    if (taskCount>0) {
      const badge = document.createElement("div"); badge.className="task-badge";
      badge.textContent = `${taskCount} task${taskCount>1?"s":""}`;
      hdr.appendChild(badge);
    }
    body.appendChild(hdr);

    const taskArea = document.createElement("div"); taskArea.className="week-tasks";
    renderDayContent(taskArea, key, true, false, false, y, m+1, day);
    if (!taskCount) {
      const noTask = document.createElement("div"); noTask.className="no-tasks";
      noTask.textContent = "No tasks yet"; taskArea.appendChild(noTask);
    }
    body.appendChild(taskArea);
    card.appendChild(body);
    list.appendChild(card);
  }
  area.appendChild(list);
}

// ── Day content (shared) ──
function renderDayContent(container, key, large, monthView, other, y, m, d) {
  // passing cross-day events
  for (let b=1;b<=14;b++) {
    const pk = addDays(key,-b);
    (tasks[pk]||[]).forEach(t => {
      if ((t.span||0)>=b) {
        container.appendChild(makePill(t, key, pk, large, monthView, null, null));
      }
    });
  }
  // tasks starting this day
  (tasks[key]||[]).forEach((t,idx) => {
    container.appendChild(makePill(t, key, key, large, monthView, idx, key));
  });
  // add button
  if (!other) {
    const btn = document.createElement("button"); btn.className="add-btn";
    btn.textContent="+ Add";
    btn.addEventListener("click", e => { e.stopPropagation(); openAddModal(key,y,m,d); });
    container.appendChild(btn);
  }
}

// ── Pill element ──
function makePill(task, dayKey, startKey, large, monthView, idx, taskKey) {
  const s = SUBJECTS[task.subject] || SUBJECTS["課程"];
  const isStart  = dayKey===startKey;
  const isEnd    = dayKey===addDays(startKey, task.span||0);
  const isSingle = (task.span||0)===0;
  const display  = monthView ? stripTime(task.text) : task.text;

  const pill = document.createElement("div");
  pill.className = "task-pill"+(task.done?" done":"")+(large?" large":"");
  pill.style.border = `1px solid ${s.bg}`;
  if (!isSingle) {
    if (isStart)      pill.style.borderRadius = "10px 0 0 10px";
    else if (isEnd)   pill.style.borderRadius = "0 10px 10px 0";
    else              pill.style.borderRadius = "0";
    if (!isStart)     pill.style.marginLeft = "-5px";
    if (!isEnd)       pill.style.marginRight = "-5px";
  }

  const bar = document.createElement("div"); bar.className="pill-bar";
  bar.style.background = s.bar; pill.appendChild(bar);

  if (isStart||isSingle) {
    const body = document.createElement("div");
    body.className = "pill-body"+(large?" large":"");
    body.style.background = s.bg; body.style.color = s.text;

    const chk = document.createElement("div"); chk.className="pill-check";
    chk.style.color = s.text; chk.textContent = task.done?"✓":"";
    chk.addEventListener("click", e => {
      e.stopPropagation();
      if (idx!==null && taskKey) { toggleTask(taskKey,idx); }
    });
    body.appendChild(chk);

    const txt = document.createElement("span");
    txt.className = "pill-text"+(large?" large":monthView?" month":"");
    txt.style.color = s.text;
    txt.style.textDecoration = task.done?"line-through":"none";
    txt.textContent = display; body.appendChild(txt);

    if (!monthView && isSingle) {
      const sub = document.createElement("span"); sub.className="pill-subject";
      sub.style.color = s.text; sub.textContent = task.subject; body.appendChild(sub);
    }

    if (isEnd||isSingle) {
      const del = document.createElement("span"); del.className="pill-del";
      del.style.color = s.text; del.textContent="✕";
      del.addEventListener("click", e => {
        e.stopPropagation();
        if (idx!==null && taskKey) { deleteTask(taskKey,idx); }
      });
      body.appendChild(del);
    }
    pill.appendChild(body);

    // click to open detail
    if (idx!==null && taskKey) {
      pill.addEventListener("click", () => openDetail(taskKey, idx));
    }
  } else {
    // continuation pill — just the bar color
    const body = document.createElement("div");
    body.className = "pill-body"+(large?" large":"");
    body.style.background = s.bg; body.style.flex="1";
    pill.appendChild(body);
  }
  return pill;
}

// ═══════════════════════════════════
// TASK ACTIONS
// ═══════════════════════════════════
function toggleTask(key, idx) {
  tasks[key][idx].done = !tasks[key][idx].done;
  saveToFirebase(); render();
}
function deleteTask(key, idx) {
  tasks[key].splice(idx,1);
  if (!tasks[key].length) delete tasks[key];
  saveToFirebase(); render();
}
function editTask(key, idx, txt) {
  tasks[key][idx].text = txt;
  saveToFirebase(); render();
}
function addTaskData(key, subject, text, span, y, m, d) {
  if (!tasks[key]) tasks[key]=[];
  tasks[key].push({id:Date.now(), subject, text, done:false, span:span||0});
  saveToFirebase(); render();
}

// ═══════════════════════════════════
// ADD MODAL
// ═══════════════════════════════════
let selSubject = "國語";

function buildSubjectChips() {
  const container = document.getElementById("subjectChips");
  container.innerHTML = "";
  KEYS.forEach(k => {
    const s = SUBJECTS[k];
    const btn = document.createElement("button");
    btn.className = "chip"+(selSubject===k?" sel":"");
    btn.style.color = selSubject===k ? s.text : "";
    btn.style.background = selSubject===k ? s.bg : "";
    btn.style.borderColor = selSubject===k ? s.text : "";
    btn.textContent = k+(k==="課程"?" ↔":"");
    btn.addEventListener("click", () => {
      selSubject = k;
      document.getElementById("crossDaySection").style.display = k==="課程"?"block":"none";
      buildSubjectChips();
    });
    container.appendChild(btn);
  });
}

function openAddModal(key, y, m, d) {
  addCtx = {key,y,m,d};
  selSubject = "國語";
  document.getElementById("addModalTitle").textContent = `+ Add — ${MONTHS_EN[m-1]} ${d}`;
  document.getElementById("taskInput").value = "";
  document.getElementById("endDateInput").value = "";
  document.getElementById("endDateInput").min = key;
  document.getElementById("crossDaySection").style.display = "none";
  buildSubjectChips();
  document.getElementById("addOverlay").classList.add("open");
  setTimeout(() => document.getElementById("taskInput").focus(), 100);
}

function closeAddModal() {
  document.getElementById("addOverlay").classList.remove("open");
  addCtx = null;
}

function confirmAdd() {
  if (!addCtx) return;
  const text = document.getElementById("taskInput").value.trim();
  if (!text) return;
  const endDate = document.getElementById("endDateInput").value;
  const span = selSubject==="課程" && endDate && endDate>=addCtx.key
    ? daysBetween(addCtx.key, endDate) : 0;
  addTaskData(addCtx.key, selSubject, text, span, addCtx.y, addCtx.m, addCtx.d);
  closeAddModal();
}

// ═══════════════════════════════════
// DETAIL POPUP
// ═══════════════════════════════════
function openDetail(key, idx) {
  const task = tasks[key]?.[idx];
  if (!task) return;
  detailCtx = {key, idx};
  isEditing = false;
  const s = SUBJECTS[task.subject]||SUBJECTS["課程"];

  document.getElementById("detailBar").style.background = s.bar;
  document.getElementById("detailMeta").textContent = `${task.subject} · ${fmtDate(key)}`;
  document.getElementById("detailTitle").textContent = task.text;
  document.getElementById("detailTitle").style.display = "";
  document.getElementById("detailEditInput").style.display = "none";
  document.getElementById("detailChip").style.background = s.bg;
  document.getElementById("detailChip").style.color = s.text;
  document.getElementById("detailChipDot").style.background = s.bar;
  document.getElementById("detailChipLabel").textContent = task.subject;

  const doneBtn = document.getElementById("detailDone");
  doneBtn.style.background = task.done?"#f8f5f1":s.bg;
  doneBtn.style.color = task.done?"var(--mid)":s.text;
  doneBtn.textContent = task.done?"↩ Undo":"✓ Done";

  const editBtn = document.getElementById("detailEdit");
  editBtn.textContent = "✏️ Edit"; editBtn.className="btn-edit";

  document.getElementById("detailOverlay").classList.add("open");
}

function closeDetail() {
  document.getElementById("detailOverlay").classList.remove("open");
  detailCtx = null; isEditing = false;
}

// ═══════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════
function prevPeriod() {
  if (view==="month") {
    if (curMonth===0){curYear--;curMonth=11;}else curMonth--;
  } else {
    weekMon.setDate(weekMon.getDate()-7);
    curYear=weekMon.getFullYear(); curMonth=weekMon.getMonth();
  }
  render();
}
function nextPeriod() {
  if (view==="month") {
    if (curMonth===11){curYear++;curMonth=0;}else curMonth++;
  } else {
    weekMon.setDate(weekMon.getDate()+7);
    curYear=weekMon.getFullYear(); curMonth=weekMon.getMonth();
  }
  render();
}
function switchView(v) {
  view=v;
  document.getElementById("btnMonth").classList.toggle("active",v==="month");
  document.getElementById("btnWeek").classList.toggle("active",v==="week");
  if (v==="week") {
    const now=new Date();
    weekMon = now.getFullYear()===curYear&&now.getMonth()===curMonth
      ? getMondayOf(now) : getMondayOf(new Date(curYear,curMonth,1));
  }
  render();
}

// ═══════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════
document.getElementById("prevBtn").addEventListener("click", prevPeriod);
document.getElementById("nextBtn").addEventListener("click", nextPeriod);
document.getElementById("btnMonth").addEventListener("click", ()=>switchView("month"));
document.getElementById("btnWeek").addEventListener("click", ()=>switchView("week"));

document.getElementById("addCancel").addEventListener("click", closeAddModal);
document.getElementById("addConfirm").addEventListener("click", confirmAdd);
document.getElementById("addOverlay").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeAddModal(); });
document.getElementById("taskInput").addEventListener("keydown", e=>{ if(e.key==="Enter") confirmAdd(); if(e.key==="Escape") closeAddModal(); });

document.getElementById("detailClose").addEventListener("click", closeDetail);
document.getElementById("detailOverlay").addEventListener("click", e=>{ if(e.target===e.currentTarget) closeDetail(); });

document.getElementById("detailDone").addEventListener("click", ()=>{
  if (!detailCtx) return;
  toggleTask(detailCtx.key, detailCtx.idx);
  closeDetail();
});

document.getElementById("detailDel").addEventListener("click", ()=>{
  if (!detailCtx) return;
  deleteTask(detailCtx.key, detailCtx.idx);
  closeDetail();
});

document.getElementById("detailEdit").addEventListener("click", ()=>{
  if (!detailCtx) return;
  if (!isEditing) {
    isEditing = true;
    const task = tasks[detailCtx.key]?.[detailCtx.idx];
    const input = document.getElementById("detailEditInput");
    const s = SUBJECTS[task.subject]||SUBJECTS["課程"];
    input.value = task.text;
    input.style.borderBottomColor = s.bar;
    input.style.display = "";
    document.getElementById("detailTitle").style.display = "none";
    document.getElementById("detailEdit").textContent = "Save";
    document.getElementById("detailEdit").className = "btn-save";
    input.focus();
  } else {
    // save
    const txt = document.getElementById("detailEditInput").value.trim();
    if (txt && detailCtx) { editTask(detailCtx.key, detailCtx.idx, txt); }
    closeDetail();
  }
});

document.addEventListener("keydown", e=>{
  if (e.key==="Escape") { closeAddModal(); closeDetail(); }
});

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
buildLegend();
render();
initFirebase();
</script>
</body>
</html>
